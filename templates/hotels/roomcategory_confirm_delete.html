{% extends "base_dashboard.html" %}
{% block title %}Delete Category | Drizzle Drop Inn{% endblock %}
{% block page_title %}Delete Category{% endblock %}

{% block content %}
<div class="card card-quiet p-4">
    <h5 class="mb-3">Delete "{{ object }}"?</h5>
    <p class="text-muted mb-4">This will remove the category from the selected hotel.</p>
    <form method="post">
        {% csrf_token %}
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger">Delete</button>
            <a href="{% url 'hotels:room_category_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
