{% extends "base_dashboard.html" %}
{% block title %}Delete Room | Drizzle Drop Inn{% endblock %}
{% block page_title %}Delete Room{% endblock %}

{% block content %}
<div class="card card-quiet p-4">
    <h5 class="mb-3">Delete room "{{ object.room_number }}"?</h5>
    <p class="text-muted mb-4">This room will be removed from {{ object.hotel }}.</p>
    <form method="post">
        {% csrf_token %}
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger">Delete</button>
            <a href="{% url 'hotels:room_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
