{% extends "base_dashboard.html" %}
{% block title %}Delete Hotel | Drizzle Drop Inn{% endblock %}
{% block page_title %}Delete Hotel{% endblock %}

{% block content %}
<div class="card card-quiet p-4">
    <h5 class="mb-3">Are you sure you want to delete "{{ object }}"?</h5>
    <p class="text-muted mb-4">This action cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger">Delete</button>
            <a href="{% url 'hotels:hotel_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
